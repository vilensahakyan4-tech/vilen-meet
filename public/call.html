<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080b14">
  <title>VILEN Meet — звонок</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="call-body">
  <div class="call-shell">
    <header class="call-bar">
      <a class="brand small" href="/"><span>V</span> VILEN Meet</a>
      <div class="call-info">
        <strong id="meetingCode">Встреча</strong>
        <small id="meetingStatus">Подключаемся…</small>
      </div>
      <button class="secondary compact" id="copyInviteBtn">Копировать ссылку</button>
      <a class="danger compact" href="/">Завершить</a>
    </header>

    <section class="call-frame-wrap">
      <div class="call-loading" id="callLoading">
        <div class="loader"></div>
        <h1>Открываем VILEN Meet…</h1>
        <p>Разреши доступ к камере и микрофону, когда браузер попросит.</p>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>
  <script src="call.js"></script>
</body>
</html>
